<!DOCTYPE html>
<!-- Coding By CodingNepal - youtube.com/codingnepal -->
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>โปรแกรมแก้ไขรูปภาพ</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.2/css/boxicons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css"/>
    <link rel="icon" href="icon.png" type="image/gif" sizes="32x32">
  </head>
  <body>
    <div class="container disable">
        <h2>โปรแกรมแก้ไขรูปภาพ ง่ายๆ</h2>
        <div class="wrapper">
            <div class="editor-panel">
                <div class="filter">
                    <label class="title">ตัวกรอง</label>
                    <div class="options">
                        <button id="brightness" class="active">ความสว่าง</button>
                        <button id="saturation">ความอิ่มตัว</button>
                        <button id="inversion">การผกผัน</button>
                        <button id="grayscale">ระดับสีเทา</button>
                    </div>
                    <div class="slider">
                        <div class="filter-info">
                            <p class="name">ความสว่าง</p>
                            <p class="value">100%</p>
                        </div>
                        <input type="range" value="100" min="0" max="200">
                    </div>
                </div>
                <div class="rotate">
                    <label class="title">หมุน และ พลิก</label>
                    <div class="options">
                        <button id="left"><i class="fa-solid fa-rotate-left"></i></button>
                        <button id="right"><i class="fa-solid fa-rotate-right"></i></button>
                        <button id="horizontal"><i class='bx bx-reflect-vertical'></i></button>
                        <button id="vertical"><i class='bx bx-reflect-horizontal' ></i></button>
                    </div>
                </div>
            </div>
            <div class="preview-img">
                <img src="image-placeholder.svg" alt="preview-img">
            </div>
        </div>
        <div class="controls">
            <button class="reset-filter">รีเซ็ตตัวกรอง</button>
            <div class="row">
                <input type="file" class="file-input" accept="image/*" hidden>
                <button class="choose-img">เลือกรูปภาพ</button>
                <button class="save-img">บันทึกภาพ</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    
  </body>
</html>
